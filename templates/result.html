{% extends "base.html" %}
{% block content %}
<h1>{{ title }}</h1>
<table class="summary">
  {% for label, value in summary %}
  <tr><td>{{ label }}</td><td>{{ value }}</td></tr>
  {% endfor %}
</table>
<iframe class="pdf-frame" src="{{ pdf_url }}"></iframe>
<p><a class="btn-secondary" href="{{ pdf_url }}" target="_blank" rel="noopener">Open PDF in a new tab</a></p>
{% endblock %}
