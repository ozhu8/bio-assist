{% extends "base.html" %}
{% block content %}
<h1>Run agentic count</h1>
<p class="page-sub">Upload an image and tell Claude what you want done with it.</p>

<form method="post" enctype="multipart/form-data" data-loading-form>
  <label class="field-label">Image</label>
  <div class="dropzone" data-dropzone>
    <input type="file" id="image" name="image" accept="image/*" required class="dropzone-input">
    <div class="dropzone-drag-overlay">Drop file here</div>
    <div class="dropzone-body">
      <div class="dropzone-icon">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="8.5" cy="9.5" r="1.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 16.5L8 12L11.5 15L15.5 10.5L21 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="dropzone-text-default">Click to browse or drag an image here</p>
      <p class="dropzone-formats">Accepts PNG, JPG, or WEBP</p>
      <p class="dropzone-change-hint" hidden>Click to choose a different image</p>
    </div>
    <img class="dropzone-preview" alt="Selected image preview" hidden>
  </div>

  <label class="field-label" for="prompt">Task</label>
  <textarea id="prompt" name="prompt" rows="2" placeholder="e.g. count the individual cells" required></textarea>

  <button type="submit" class="btn-primary">Run</button>
</form>
{% endblock %}
